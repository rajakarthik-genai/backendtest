# Pre-commit configuration for MediTwin Frontend
# See https://pre-commit.com for more information
repos:
  # General repository hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        description: Removes trailing whitespace
      - id: end-of-file-fixer
        description: Ensures files end with a newline
      - id: check-yaml
        description: Validates YAML syntax
      - id: check-json
        description: Validates JSON syntax
      - id: check-added-large-files
        args: ['--maxkb=500']
        description: Prevents committing large files (>500KB)
      - id: check-merge-conflict
        description: Detects merge conflict markers

  # HTML/CSS/JS formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        description: Formats HTML, CSS, JS, JSON, Markdown
        types_or: [html, css, javascript, json, markdown]
        args: ['--tab-width=4', '--single-quote', '--trailing-comma=es5']

  # HTML validation
  - repo: https://github.com/Lucas-C/pre-commit-hooks-markup
    rev: v1.0.1
    hooks:
      - id: rst-backticks
        description: Detects common reStructuredText issues
      - id: rst-directive-colons
        description: Detects missing colons in reStructuredText directives
      - id: rst-inline-touching-normal
        description: Detects inline markup touching normal text

  # JavaScript/HTML linting (basic)
  - repo: local
    hooks:
      - id: html-validator
        name: HTML Validator
        description: Validates HTML syntax
        entry: python3
        args: ['-c', 'import sys; import re; content = open(sys.argv[1]).read(); print("✓ HTML syntax looks good") if "<html" in content and "</html>" in content else sys.exit(1)']
        language: system
        files: \.html$

  # Security checks for frontend
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        description: Detects secrets in code
        args: ['--baseline', '.secrets.baseline']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        description: Lints Markdown files
        args: ['--fix']

  # Commit message formatting
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        description: Ensures conventional commit messages
        stages: [commit-msg]
