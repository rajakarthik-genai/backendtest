<!DOCTYPE html>
<html>
<head>
    <title>Test ShowTab Function</title>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Login</button>
        <button class="tab" onclick="showTab('signup')">Sign Up</button>
    </div>

    <div id="loginForm" class="form-container active">
        <h3>Login Form</h3>
    </div>

    <div id="signupForm" class="form-container">
        <h3>Signup Form</h3>
    </div>

    <button onclick="testProgrammaticSwitch()">Test Programmatic Switch</button>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.form-container').forEach(form => {
                form.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName + 'Form').classList.add('active');
            
            // Find and activate the corresponding tab button
            const tabButtons = document.querySelectorAll('.tab');
            tabButtons.forEach(tab => {
                if (tab.getAttribute('onclick').includes(`'${tabName}'`)) {
                    tab.classList.add('active');
                }
            });
        }

        function testProgrammaticSwitch() {
            console.log('Testing programmatic switch to login tab...');
            showTab('login');
            console.log('Switch completed without error!');
        }
    </script>

    <style>
        .form-container {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            margin: 10px 0;
        }
        .form-container.active {
            display: block;
        }
        .tab {
            padding: 10px;
            margin: 5px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }
        .tab.active {
            background: #007bff;
            color: white;
        }
    </style>
</body>
</html>
